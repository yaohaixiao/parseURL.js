<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>parseURL</title>
  <link href="css/style.css" type="text/css" rel="stylesheet"/>
</head>
<body>
<header class="header">
  <h1 class="title">parseURL</h1>
</header>
<section class="download">
  <p>下载地址：<a href="https://github.com/yaohaixiao/parseURL/archive/refs/heads/main.zip" target="_blank">parseUrl.zip</a></p>
</section>
<section class="container">
  <section class="controls">
    <label class="label" for="url">URL 地址：</label>
    <div class="field">
      <input id="url" name="url" placeholder="请输入要解析的 URL" type="text" value="" class="input url"/>
    </div>
    <button type="button" id="parse" name="parse" class="button parse">解析 URL</button>
  </section>
  <section class="content">
    <textarea id="results" name="results" cols="20" rows="10" class="textarea results"></textarea>
  </section>
</section>
<footer class="footer">
  <p>Copyright &copy; 2008-2021 <a href="http://www.yaohaixiao.com/" target="_blank">Yaohaixiao</a>, all right reserved.
  </p>
</footer>
<script src="js/parseURL.js"></script>
<script>
  (function () {
    var $results = document.querySelector('#results')
    var $url = document.querySelector('#url')
    var $parse = document.querySelector('#parse')

    $parse.addEventListener('click', function () {
      var url = $url.value
      var results = parseURL(url)

      $results.value = JSON.stringify(results, null, 4)
    })
  })()
</script>
</body>
</html>
