<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keywords" content="JavaScript,parseURL.js">
  <meta name="description" content="parseURL.js 提供一个 parseURL() 函数方法，可以很方便快速地解析出 URL 字符串中的各个信息，并将解析出的 URL 信息作为一个对象返回。返回的对象中包含的 URL 信息有：href、origin、username、password、hostname、port、host、pathname、search、path 和 hash。">
  <title>parseURL.js</title>
  <link href="css/style.css" type="text/css" rel="stylesheet">
</head>
<body>
<header class="header">
  <h1 class="title">parseURL.js</h1>
  <a href="https://github.com/yaohaixiao/parseURL.js/archive/refs/heads/main.zip" class="download">Download parseURL.js</a>
</header>
<section class="project">
  <p>
    <a href="https://github.com/yaohaixiao/parseURL.js">GitHub</a>
    <span>&nbsp;&nbsp;&nbsp;&nbsp;</span>
    <a href="https://github.com/yaohaixiao/parseURL.js/issues">Issues</a>
  </p>
</section>
<section class="container">
  <section class="controls">
    <label class="label" for="url">URL 地址：</label>
    <div class="field">
      <input id="url" name="url" placeholder="请输入 URL" type="text" value="http://yao:123@www.yaohaixiao.com:8080/scripts/parseUrl/?id=1&project=parseUrl@top" class="input url"/>
    </div>
    <button type="button" id="parse" name="parse" class="button parse">解析 URL</button>
  </section>
  <section class="content">
    <textarea id="results" name="results" cols="20" rows="10" class="textarea results"></textarea>
  </section>
</section>
<footer class="footer">
  <p>Copyright &copy; 2008-2021 <a href="http://www.yaohaixiao.com/">Yaohaixiao</a>, all right reserved.
  </p>
</footer>
<script src="js/parseURL.js"></script>
<script>
  (function () {
    var $results = document.querySelector('#results')
    var $url = document.querySelector('#url')
    var $parse = document.querySelector('#parse')

    $parse.addEventListener('click', function () {
      var url = $url.value
      var results = parseURL(url)

      $results.value = JSON.stringify(results, null, 4)
    })
  })()
</script>
</body>
</html>
